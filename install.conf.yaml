- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.vimrc:
        path: vimrc
        force: true
    ~/.zshrc:
        path: zshrc
        force: true
    ~/.gitconfig:
        path: gitconfig
        force: true
    ~/.bash_profile:
        path: bash_profile
        force: true
    ~/.bashrc:
        path: bashrc
        force: true
    ~/.zsh:
        path: zsh/
        force: true
    ~/.tmux.conf:
        path: tmux.conf
        force: true
    ~/.tmux/plugins/tpm:
        path: tpm/
        force: true
        create: true

- shell:
    - [mkdir -p ~/.vim/backup, Create Vim backup dir]
    - [mkdir -p ~/.vim/swap, Create Vim swap dir]
    - [mkdir -p ~/.vim/undo, Create Vim undo dir]
    - [git submodule update --init --recursive, Installing submodules]
