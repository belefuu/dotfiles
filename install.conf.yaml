- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.jshintrc:
        path: jshintrc
        force: true
    ~/.vimrc:
        path: vimrc
        force: true
    ~/.vim:
        path: vim
        force: true
    ~/.zshrc:
        path: zshrc
        force: true
    ~/.gitconfig:
        path: gitconfig
        force: true
    ~/.gitignore_global:
        path: gitignore_global
        force: true
    ~/.bash_profile:
        path: bash_profile
        force: true
    ~/.bashrc:
        path: bashrc
        force: true
    ~/.zsh:
        path: zsh/
        force: true
    ~/.tmux.conf:
        path: tmux.conf
        force: true
    ~/.tmux/plugins/tpm:
        path: tpm/
        force: true
        create: true

- create:
    - ~/.config2

- shell:
    - [git submodule update --init --recursive, Installing submodules]
    - ["git clone https://github.com/chriskempson/base16-shell.git ~/.config/base16-shell", Installing base16-shell]
